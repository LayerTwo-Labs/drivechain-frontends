syntax = "proto3";

package multisig.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service MultisigService {
  // Group CRUD
  rpc ListGroups(google.protobuf.Empty) returns (ListGroupsResponse);
  rpc SaveGroup(SaveGroupRequest) returns (SaveGroupResponse);
  rpc DeleteGroup(DeleteGroupRequest) returns (google.protobuf.Empty);

  // Transaction CRUD
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc GetTransaction(GetTransactionRequest) returns (MultisigTransaction);
  rpc GetTransactionByTxid(GetTransactionByTxidRequest) returns (MultisigTransaction);
  rpc SaveTransaction(SaveTransactionRequest) returns (SaveTransactionResponse);

  // Solo key management
  rpc ListSoloKeys(google.protobuf.Empty) returns (ListSoloKeysResponse);
  rpc AddSoloKey(AddSoloKeyRequest) returns (google.protobuf.Empty);

  // Account index
  rpc GetNextAccountIndex(GetNextAccountIndexRequest) returns (GetNextAccountIndexResponse);
}

// ─── Group messages ────────────────────────────────────────────────

message MultisigKey {
  string owner = 1;
  string xpub = 2;
  string derivation_path = 3;
  string fingerprint = 4;
  string origin_path = 5;
  bool is_wallet = 6;
  // Per-transaction signed PSBTs keyed by transaction ID
  map<string, string> active_psbts = 7;
  // Per-transaction initial (unsigned) PSBTs keyed by transaction ID
  map<string, string> initial_psbts = 8;
}

message AddressInfo {
  int32 index = 1;
  string address = 2;
  bool used = 3;
}

message UtxoDetail {
  string txid = 1;
  int32 vout = 2;
  string address = 3;
  double amount = 4;
  int32 confirmations = 5;
  string script_pub_key = 6;
  bool spendable = 7;
  bool solvable = 8;
  bool safe = 9;
}

message MultisigGroup {
  string id = 1;
  string name = 2;
  int32 n = 3;
  int32 m = 4;
  repeated MultisigKey keys = 5;
  int64 created = 6;
  string txid = 7;

  string base_descriptor = 8;
  string descriptor_receive = 9;
  string descriptor_change = 10;
  string watch_wallet_name = 11;

  repeated AddressInfo receive_addresses = 12;
  repeated AddressInfo change_addresses = 13;
  repeated UtxoDetail utxo_details = 14;

  double balance = 15;
  int32 utxos = 16;
  int32 next_receive_index = 17;
  int32 next_change_index = 18;
  repeated string transaction_ids = 19;
}

message ListGroupsResponse {
  repeated MultisigGroup groups = 1;
}

message SaveGroupRequest {
  MultisigGroup group = 1;
}

message SaveGroupResponse {
  MultisigGroup group = 1;
}

message DeleteGroupRequest {
  string group_id = 1;
}

// ─── Transaction messages ──────────────────────────────────────────

enum TxStatus {
  TX_STATUS_UNSPECIFIED = 0;
  TX_STATUS_NEEDS_SIGNATURES = 1;
  TX_STATUS_AWAITING_SIGNED_PSBTS = 2;
  TX_STATUS_READY_TO_COMBINE = 3;
  TX_STATUS_READY_FOR_BROADCAST = 4;
  TX_STATUS_BROADCASTED = 5;
  TX_STATUS_CONFIRMED = 6;
  TX_STATUS_COMPLETED = 7;
  TX_STATUS_VOIDED = 8;
}

enum TxType {
  TX_TYPE_UNSPECIFIED = 0;
  TX_TYPE_DEPOSIT = 1;
  TX_TYPE_WITHDRAWAL = 2;
}

message KeyPSBTStatus {
  string key_id = 1;
  string psbt = 2;
  bool is_signed = 3;
  google.protobuf.Timestamp signed_at = 4;
}

message MultisigTransaction {
  string id = 1;
  string group_id = 2;
  string initial_psbt = 3;
  repeated KeyPSBTStatus key_psbts = 4;
  string combined_psbt = 5;
  string final_hex = 6;
  string txid = 7;
  TxStatus status = 8;
  TxType type = 9;
  google.protobuf.Timestamp created = 10;
  google.protobuf.Timestamp broadcast_time = 11;
  double amount = 12;
  string destination = 13;
  double fee = 14;
  repeated UtxoDetail inputs = 15;
  int32 confirmations = 16;
  int32 required_signatures = 17;
}

message ListTransactionsRequest {
  // Optional: filter by group
  string group_id = 1;
}

message ListTransactionsResponse {
  repeated MultisigTransaction transactions = 1;
}

message GetTransactionRequest {
  string transaction_id = 1;
}

message GetTransactionByTxidRequest {
  string txid = 1;
}

message SaveTransactionRequest {
  MultisigTransaction transaction = 1;
}

message SaveTransactionResponse {
  MultisigTransaction transaction = 1;
}

// ─── Solo key messages ─────────────────────────────────────────────

message SoloKey {
  string xpub = 1;
  string derivation_path = 2;
  string fingerprint = 3;
  string origin_path = 4;
  string owner = 5;
}

message ListSoloKeysResponse {
  repeated SoloKey keys = 1;
}

message AddSoloKeyRequest {
  SoloKey key = 1;
}

// ─── Account index ─────────────────────────────────────────────────

message GetNextAccountIndexRequest {
  // Additional indices already claimed in the current session
  repeated int32 additional_used_indices = 1;
}

message GetNextAccountIndexResponse {
  int32 next_index = 1;
}
