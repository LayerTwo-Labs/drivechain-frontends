version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/LayerTwo-Labs/sidesail/coinnews/server/gen
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.10
    out: gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go:v1.19.0
    out: gen
    opt: paths=source_relative
inputs:
  - directory: proto
