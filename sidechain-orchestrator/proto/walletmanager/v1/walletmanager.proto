syntax = "proto3";

package walletmanager.v1;

import "orchestrator/v1/orchestrator.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service WalletManagerService {
  // Wallet lifecycle
  rpc GetWalletStatus(GetWalletStatusRequest) returns (GetWalletStatusResponse);
  rpc GenerateWallet(GenerateWalletRequest) returns (GenerateWalletResponse);
  rpc UnlockWallet(UnlockWalletRequest) returns (UnlockWalletResponse);
  rpc LockWallet(LockWalletRequest) returns (LockWalletResponse);
  rpc EncryptWallet(EncryptWalletRequest) returns (EncryptWalletResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc RemoveEncryption(RemoveEncryptionRequest) returns (RemoveEncryptionResponse);
  rpc ListWallets(ListWalletsRequest) returns (ListWalletsResponse);
  rpc SwitchWallet(SwitchWalletRequest) returns (SwitchWalletResponse);
  rpc UpdateWalletMetadata(UpdateWalletMetadataRequest) returns (UpdateWalletMetadataResponse);
  rpc DeleteWallet(DeleteWalletRequest) returns (DeleteWalletResponse);
  rpc DeleteAllWallets(DeleteAllWalletsRequest) returns (DeleteAllWalletsResponse);
  rpc ListWalletBackups(ListWalletBackupsRequest) returns (ListWalletBackupsResponse);
  rpc RestoreWalletBackup(RestoreWalletBackupRequest) returns (RestoreWalletBackupResponse);
  rpc RestoreWalletBackupStream(RestoreWalletBackupRequest) returns (stream RestoreWalletBackupProgressResponse);
  rpc CreateWatchOnlyWallet(CreateWatchOnlyWalletRequest) returns (CreateWatchOnlyWalletResponse);
  // Create an electrum wallet: keys are generated locally, but no local Bitcoin
  // Core or enforcer runs — chain data is served remotely via the datasource.
  rpc CreateElectrumWallet(CreateElectrumWalletRequest) returns (CreateElectrumWalletResponse);

  // Core wallet management
  rpc CreateBitcoinCoreWallet(CreateBitcoinCoreWalletRequest) returns (CreateBitcoinCoreWalletResponse);
  rpc EnsureCoreWallets(EnsureCoreWalletsRequest) returns (EnsureCoreWalletsResponse);

  // Bitcoin operations (proxied through Core RPC)
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc GetNewAddress(GetNewAddressRequest) returns (GetNewAddressResponse);
  rpc SendTransaction(SendTransactionRequest) returns (SendTransactionResponse);
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc ListUnspent(ListUnspentRequest) returns (ListUnspentResponse);
  rpc ListReceiveAddresses(ListReceiveAddressesRequest) returns (ListReceiveAddressesResponse);
  rpc GetTransactionDetails(GetTransactionDetailsRequest) returns (GetTransactionDetailsResponse);
  rpc BumpFee(BumpFeeRequest) returns (BumpFeeResponse);
  rpc DeriveAddresses(DeriveAddressesRequest) returns (DeriveAddressesResponse);

  // PSBT (BIP174). CreatePsbt builds an unsigned PSBT for a send (works for
  // watch-only wallets); SignPsbt adds this wallet's signatures; CombinePsbt
  // merges cosigner PSBTs; FinalizePsbt extracts the raw transaction. Electrum
  // wallets only.
  rpc CreatePsbt(CreatePsbtRequest) returns (CreatePsbtResponse);
  rpc SignPsbt(SignPsbtRequest) returns (SignPsbtResponse);
  rpc CombinePsbt(CombinePsbtRequest) returns (CombinePsbtResponse);
  rpc FinalizePsbt(FinalizePsbtRequest) returns (FinalizePsbtResponse);

  // Seed access for cheque engine
  rpc GetWalletSeed(GetWalletSeedRequest) returns (GetWalletSeedResponse);

  // Bitcoin Core variant selection (untouched / touched / knots).
  rpc ListCoreVariants(ListCoreVariantsRequest) returns (ListCoreVariantsResponse);
  rpc GetCoreVariant(GetCoreVariantRequest) returns (GetCoreVariantResponse);
  rpc SetCoreVariant(SetCoreVariantRequest) returns (SetCoreVariantResponse);

  // Test-sidechains toggle. When enabled, layer-2 binaries download/run from
  // the alternative_download config (test builds) instead of the default.
  rpc GetTestSidechains(GetTestSidechainsRequest) returns (GetTestSidechainsResponse);
  rpc SetTestSidechains(SetTestSidechainsRequest) returns (SetTestSidechainsResponse);

  // Stream wallet state changes. Sends the full wallet state immediately,
  // then again whenever wallets or balance change.
  rpc WatchWalletData(google.protobuf.Empty) returns (stream WatchWalletDataResponse);
}

// ============================================================================
// Status
// ============================================================================

message GetWalletStatusRequest {}

message GetWalletStatusResponse {
  bool has_wallet = 1;
  bool encrypted = 2;
  bool unlocked = 3;
  string active_wallet_id = 4;
  string active_wallet_name = 5;
}

// ============================================================================
// Generate
// ============================================================================

message GenerateWalletRequest {
  string name = 1;
  string custom_mnemonic = 2; // optional
  string passphrase = 3; // optional
}

message GenerateWalletResponse {
  string wallet_id = 1;
  string mnemonic = 2; // master mnemonic for display to user
}

// ============================================================================
// Unlock/Lock
// ============================================================================

message UnlockWalletRequest {
  string password = 1;
}

message UnlockWalletResponse {}

message LockWalletRequest {}

message LockWalletResponse {}

// ============================================================================
// Encrypt
// ============================================================================

message EncryptWalletRequest {
  string password = 1;
}

message EncryptWalletResponse {}

message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message ChangePasswordResponse {}

message RemoveEncryptionRequest {
  string password = 1;
}

message RemoveEncryptionResponse {}

// ============================================================================
// List/Switch/Update/Delete Wallets
// ============================================================================

enum WalletType {
  WALLET_TYPE_UNSPECIFIED = 0;
  WALLET_TYPE_BITCOIN_CORE = 1;
  WALLET_TYPE_ENFORCER = 2;
  // Electrum wallet — keys are local, but it runs neither Bitcoin Core nor the
  // enforcer locally; chain/wallet read data is served via the datasource layer.
  WALLET_TYPE_ELECTRUM = 3;
}

message WalletMetadata {
  string id = 1;
  string name = 2;
  WalletType wallet_type = 3;
  string gradient_json = 4;
  string created_at = 5; // ISO 8601
  // BIP47 v3 payment code derived from the wallet's master pubkey.
  // Deterministic per wallet, never changes. Empty for watch-only wallets.
  string bip47_payment_code = 6;

  // Starter material — populated for the active wallet only, empty otherwise.
  // The Starters tab and HD wallet provider read these instead of hitting a
  // separate RPC.
  string master_mnemonic = 7;
  string l1_mnemonic = 8;
  repeated SidechainStarter sidechains = 9;

  // Watch-only wallets track an external xpub/descriptor; no spending key.
  bool watch_only = 10;
}

message SidechainStarter {
  int32 slot = 1;
  string name = 2;
  string mnemonic = 3;
}

message ListWalletsRequest {}

message ListWalletsResponse {
  repeated WalletMetadata wallets = 1;
  string active_wallet_id = 2;
}

message SwitchWalletRequest {
  string wallet_id = 1;
}

message SwitchWalletResponse {}

message UpdateWalletMetadataRequest {
  string wallet_id = 1;
  string name = 2;
  string gradient_json = 3;
}

message UpdateWalletMetadataResponse {}

message DeleteWalletRequest {
  string wallet_id = 1;
}

message DeleteWalletResponse {}

message DeleteAllWalletsRequest {}

message DeleteAllWalletsResponse {}

message BalanceSnapshot {
  orchestrator.v1.BinaryType binary = 1;
  string display_name = 2;
  uint64 confirmed_sats = 3;
  uint64 pending_sats = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message BackupWalletSummary {
  string id = 1;
  string name = 2;
  string wallet_type = 3;
}

message WalletBackup {
  string backup_id = 1;
  google.protobuf.Timestamp created_at = 2;
  string source_name = 3;
  bool encrypted = 4;
  bool has_metadata = 5;
  string active_wallet_id = 6;
  repeated BackupWalletSummary wallets = 7;
  repeated BalanceSnapshot latest_known_balance = 8;
  bool valid = 9;
  string error_message = 10;
}

message ListWalletBackupsRequest {}

message ListWalletBackupsResponse {
  repeated WalletBackup backups = 1;
}

message RestoreWalletBackupRequest {
  string backup_id = 1;
  string password = 2;
}

message RestoreWalletBackupResponse {}

message RestoreWalletBackupStep {
  string step_id = 1;
  string name = 2;
}

enum RestoreWalletBackupStepState {
  RESTORE_WALLET_BACKUP_STEP_STATE_UNSPECIFIED = 0;
  RESTORE_WALLET_BACKUP_STEP_STATE_STARTED = 1;
  RESTORE_WALLET_BACKUP_STEP_STATE_COMPLETED = 2;
  RESTORE_WALLET_BACKUP_STEP_STATE_FAILED = 3;
}

message RestoreWalletBackupProgressStatus {
  string step_id = 1;
  RestoreWalletBackupStepState state = 2;
  string error = 3;
  bool complete = 4;
}

message RestoreWalletBackupProgressResponse {
  repeated RestoreWalletBackupStep steps = 1;
  RestoreWalletBackupProgressStatus status = 2;
}

// ============================================================================
// Watch-Only Wallet
// ============================================================================

message CreateWatchOnlyWalletRequest {
  string name = 1;
  string xpub_or_descriptor = 2;
  string gradient_json = 3;
}

message CreateWatchOnlyWalletResponse {
  string wallet_id = 1;
}

// ============================================================================
// Electrum Wallet
// ============================================================================

message CreateElectrumWalletRequest {
  string name = 1;
  string gradient_json = 2;
  // Optional sidechain slots to provision starter material for. Empty = all.
  repeated uint32 slots = 3;
  // Optional BIP39 mnemonic to import an existing seed. Empty = generate a
  // new seed. Mutually exclusive with xpub_or_descriptor.
  string custom_mnemonic = 4;
  // Optional xpub or output descriptor for a watch-only electrum wallet
  // (no private keys; cannot sign or send). Mutually exclusive with
  // custom_mnemonic.
  string xpub_or_descriptor = 5;
}

message CreateElectrumWalletResponse {
  string wallet_id = 1;
}

// ============================================================================
// Core Wallet Management
// ============================================================================

message CreateBitcoinCoreWalletRequest {
  string wallet_id = 1;  // wallet ID from wallet.json
}

message CreateBitcoinCoreWalletResponse {
  string core_wallet_name = 1;  // Bitcoin Core wallet name
}

message EnsureCoreWalletsRequest {}

message EnsureCoreWalletsResponse {
  int32 synced_count = 1;
}

// ============================================================================
// Bitcoin Operations
// ============================================================================

message GetBalanceRequest {
  string wallet_id = 1;  // empty = active wallet
}

message GetBalanceResponse {
  double confirmed_sats = 1;
  double unconfirmed_sats = 2;
}

message GetNewAddressRequest {
  string wallet_id = 1;  // empty = active wallet
}

message GetNewAddressResponse {
  string address = 1;
  int32 index = 2;
}

message SendTransactionRequest {
  string wallet_id = 1;  // empty = active wallet
  map<string, int64> destinations = 2;  // address -> satoshis
  int64 fee_rate_sat_per_vbyte = 3;     // 0 = use default
  bool subtract_fee_from_amount = 4;
  // Raw OP_RETURN payload hex.
  string op_return_hex = 5;
  // Exact fee in sats when caller wants deterministic fee selection.
  int64 fixed_fee_sats = 6;
  // Explicit wallet inputs to spend.
  repeated UnspentOutput required_inputs = 7;
  // Build an eCash replay-protected transaction (magic version + extra byte so
  // Bitcoin Core can't deserialize it). Core wallets only.
  bool replay_protect = 8;
}

message SendTransactionResponse {
  string txid = 1;
}

message CreatePsbtRequest {
  string wallet_id = 1;  // empty = active wallet
  map<string, int64> destinations = 2;  // address -> satoshis
  int64 fee_rate_sat_per_vbyte = 3;     // 0 = use default
  bool subtract_fee_from_amount = 4;
  string op_return_hex = 5;
  int64 fixed_fee_sats = 6;
  repeated UnspentOutput required_inputs = 7;
}

message CreatePsbtResponse {
  string psbt_base64 = 1;
}

message SignPsbtRequest {
  string wallet_id = 1;  // empty = active wallet
  string psbt_base64 = 2;
}

message SignPsbtResponse {
  string psbt_base64 = 1;
}

message CombinePsbtRequest {
  repeated string psbt_base64 = 1;
}

message CombinePsbtResponse {
  string psbt_base64 = 1;
}

message FinalizePsbtRequest {
  string psbt_base64 = 1;
}

message FinalizePsbtResponse {
  string raw_tx_hex = 1;
}

message ListTransactionsRequest {
  string wallet_id = 1;
  int32 count = 2;   // 0 = default (100)
}

message TransactionEntry {
  string txid = 1;
  int32 vout = 2;
  string address = 3;
  string category = 4;  // send, receive, generate, immature
  double amount = 5;    // BTC
  int64 amount_sats = 6;
  int32 confirmations = 7;
  int64 block_time = 8;
  int64 time = 9;
  string label = 10;
  double fee = 11;
  bool replaced_by_txid = 12;
  string wallet_id = 13;
}

message ListTransactionsResponse {
  repeated TransactionEntry transactions = 1;
}

message ListUnspentRequest {
  string wallet_id = 1;
}

message UnspentOutput {
  string txid = 1;
  int32 vout = 2;
  string address = 3;
  double amount = 4;    // BTC
  int64 amount_sats = 5;
  int32 confirmations = 6;
  string label = 7;
  bool spendable = 8;
  bool solvable = 9;
  string wallet_id = 10;
  // Wallet's first-seen mempool timestamp when available, otherwise the
  // confirming block's time. Unset if neither is known.
  google.protobuf.Timestamp received_at = 11;
}

message ListUnspentResponse {
  repeated UnspentOutput utxos = 1;
}

message ListReceiveAddressesRequest {
  string wallet_id = 1;
}

message ReceiveAddress {
  string address = 1;
  double amount = 2;  // BTC total received
  int64 amount_sats = 3;
  string label = 4;
  int32 tx_count = 5;
}

message ListReceiveAddressesResponse {
  repeated ReceiveAddress addresses = 1;
}

message GetTransactionDetailsRequest {
  string wallet_id = 1;
  string txid = 2;
}

message GetTransactionDetailsResponse {
  TransactionEntry transaction = 1;
  string raw_hex = 2;
  string blockhash = 3;
  int32 confirmations = 4;
  int64 block_time = 5;
  int32 version = 6;
  int32 locktime = 7;
  int32 size_bytes = 8;
  int32 vsize_vbytes = 9;
  int32 weight_wu = 10;
  int64 fee_sats = 11;
  double fee_rate_sat_vb = 12;
  repeated TransactionInput inputs = 13;
  int64 total_input_sats = 14;
  repeated TransactionOutput outputs = 15;
  int64 total_output_sats = 16;
}

message TransactionInput {
  int32 index = 1;
  string prev_txid = 2;
  int32 prev_vout = 3;
  string address = 4;
  int64 value_sats = 5;
  string script_sig_asm = 6;
  string script_sig_hex = 7;
  repeated string witness = 8;
  int64 sequence = 9;
  bool is_coinbase = 10;
}

message TransactionOutput {
  int32 index = 1;
  int64 value_sats = 2;
  string address = 3;
  string script_type = 4;
  string script_pubkey_asm = 5;
  string script_pubkey_hex = 6;
}

message BumpFeeRequest {
  string wallet_id = 1;
  string txid = 2;
  int64 new_fee_rate = 3;  // sat/vB, 0 = automatic
}

message BumpFeeResponse {
  string new_txid = 1;
}

message DeriveAddressesRequest {
  string wallet_id = 1;
  int32 start_index = 2;
  int32 count = 3;
}

message DeriveAddressesResponse {
  repeated string addresses = 1;
}

// ============================================================================
// Seed Access
// ============================================================================

message GetWalletSeedRequest {
  string wallet_id = 1;  // specific wallet, or empty for enforcer
}

message GetWalletSeedResponse {
  string seed_hex = 1;
  // BIP39 mnemonic words for the wallet. Sensitive — treat like seed_hex.
  string mnemonic = 2;
}

// ============================================================================
// Core variant selection
// ============================================================================

message ListCoreVariantsRequest {}

message CoreVariant {
  string id = 1;
  string display_name = 2;
  bool installed = 3;
}

message ListCoreVariantsResponse {
  repeated CoreVariant variants = 1;
  string active_id = 2;
}

message GetCoreVariantRequest {}

message GetCoreVariantResponse {
  string id = 1;
}

message SetCoreVariantRequest {
  string id = 1;
}

message SetCoreVariantResponse {}

// ============================================================================
// Test-sidechains toggle
// ============================================================================

message GetTestSidechainsRequest {}

message GetTestSidechainsResponse {
  bool enabled = 1;
}

message SetTestSidechainsRequest {
  bool enabled = 1;
}

message SetTestSidechainsResponse {}

// ============================================================================
// Watch Wallet Data
// ============================================================================

message WatchWalletDataResponse {
  // Wallet status
  bool has_wallet = 1;
  bool encrypted = 2;
  bool unlocked = 3;
  string active_wallet_id = 4;

  // All wallets
  repeated WalletMetadata wallets = 5;

  // Active wallet balance (zero if no active wallet)
  double confirmed_sats = 6;
  double unconfirmed_sats = 7;

  // Monotonic sequence number per send within a single stream. Lets the
  // client detect missed events across a reconnect.
  int64 seq = 8;
  // Idle keepalive frames carry no payload — only `seq` and `heartbeat=true`
  // are populated. The client's heartbeat watchdog uses these to tell a
  // healthy-but-quiet stream apart from a half-open connection.
  bool heartbeat = 9;
}
