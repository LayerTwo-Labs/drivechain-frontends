syntax = "proto3";

package coinshift.v1;

service CoinShiftService {
  // Get wallet balance (total and available).
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);

  // Get current block count.
  rpc GetBlockCount(GetBlockCountRequest) returns (GetBlockCountResponse);

  // Stop the coinshift node.
  rpc Stop(StopRequest) returns (StopResponse);

  // Get a new address from the wallet.
  rpc GetNewAddress(GetNewAddressRequest) returns (GetNewAddressResponse);

  // Withdraw to mainchain.
  rpc Withdraw(WithdrawRequest) returns (WithdrawResponse);

  // Transfer within sidechain.
  rpc Transfer(TransferRequest) returns (TransferResponse);

  // Get total sidechain wealth in sats.
  rpc GetSidechainWealth(GetSidechainWealthRequest) returns (GetSidechainWealthResponse);

  // Create a deposit transaction.
  rpc CreateDeposit(CreateDepositRequest) returns (CreateDepositResponse);

  // Get pending withdrawal bundle.
  rpc GetPendingWithdrawalBundle(GetPendingWithdrawalBundleRequest) returns (GetPendingWithdrawalBundleResponse);

  // Connect to a peer.
  rpc ConnectPeer(ConnectPeerRequest) returns (ConnectPeerResponse);

  // Forget a peer.
  rpc ForgetPeer(ForgetPeerRequest) returns (ForgetPeerResponse);

  // List connected peers.
  rpc ListPeers(ListPeersRequest) returns (ListPeersResponse);

  // Mine a block.
  rpc Mine(MineRequest) returns (MineResponse);

  // Get block by hash.
  rpc GetBlock(GetBlockRequest) returns (GetBlockResponse);

  // Get best mainchain block hash.
  rpc GetBestMainchainBlockHash(GetBestMainchainBlockHashRequest) returns (GetBestMainchainBlockHashResponse);

  // Get best sidechain block hash.
  rpc GetBestSidechainBlockHash(GetBestSidechainBlockHashRequest) returns (GetBestSidechainBlockHashResponse);

  // Get BMM inclusions for a block.
  rpc GetBmmInclusions(GetBmmInclusionsRequest) returns (GetBmmInclusionsResponse);

  // Get wallet UTXOs.
  rpc GetWalletUtxos(GetWalletUtxosRequest) returns (GetWalletUtxosResponse);

  // List all UTXOs.
  rpc ListUtxos(ListUtxosRequest) returns (ListUtxosResponse);

  // Remove transaction from mempool.
  rpc RemoveFromMempool(RemoveFromMempoolRequest) returns (RemoveFromMempoolResponse);

  // Get latest failed withdrawal bundle height.
  rpc GetLatestFailedWithdrawalBundleHeight(GetLatestFailedWithdrawalBundleHeightRequest) returns (GetLatestFailedWithdrawalBundleHeightResponse);

  // Generate a new mnemonic.
  rpc GenerateMnemonic(GenerateMnemonicRequest) returns (GenerateMnemonicResponse);

  // Set seed from mnemonic.
  rpc SetSeedFromMnemonic(SetSeedFromMnemonicRequest) returns (SetSeedFromMnemonicResponse);

  // Raw JSON-RPC passthrough for debug console.
  rpc CallRaw(CallRawRequest) returns (CallRawResponse);

  // --- CoinShift-specific methods ---

  // Get wallet addresses.
  rpc GetWalletAddresses(GetWalletAddressesRequest) returns (GetWalletAddressesResponse);

  // Get OpenAPI schema.
  rpc OpenapiSchema(OpenapiSchemaRequest) returns (OpenapiSchemaResponse);

  // Create a swap (L2 to L1).
  rpc CreateSwap(CreateSwapRequest) returns (CreateSwapResponse);

  // Claim a swap.
  rpc ClaimSwap(ClaimSwapRequest) returns (ClaimSwapResponse);

  // Get swap status.
  rpc GetSwapStatus(GetSwapStatusRequest) returns (GetSwapStatusResponse);

  // List all swaps.
  rpc ListSwaps(ListSwapsRequest) returns (ListSwapsResponse);

  // List swaps for a specific recipient.
  rpc ListSwapsByRecipient(ListSwapsByRecipientRequest) returns (ListSwapsByRecipientResponse);

  // Update swap L1 transaction ID.
  rpc UpdateSwapL1Txid(UpdateSwapL1TxidRequest) returns (UpdateSwapL1TxidResponse);

  // Reconstruct all swaps from blockchain.
  rpc ReconstructSwaps(ReconstructSwapsRequest) returns (ReconstructSwapsResponse);
}

// GetBalance

message GetBalanceRequest {}

message GetBalanceResponse {
  int64 total_sats = 1;
  int64 available_sats = 2;
}

// GetBlockCount

message GetBlockCountRequest {}

message GetBlockCountResponse {
  int64 count = 1;
}

// Stop

message StopRequest {}

message StopResponse {}

// GetNewAddress

message GetNewAddressRequest {}

message GetNewAddressResponse {
  string address = 1;
}

// Withdraw

message WithdrawRequest {
  string address = 1;
  int64 amount_sats = 2;
  int64 side_fee_sats = 3;
  int64 main_fee_sats = 4;
}

message WithdrawResponse {
  string txid = 1;
}

// Transfer

message TransferRequest {
  string address = 1;
  int64 amount_sats = 2;
  int64 fee_sats = 3;
}

message TransferResponse {
  string txid = 1;
}

// GetSidechainWealth

message GetSidechainWealthRequest {}

message GetSidechainWealthResponse {
  int64 sats = 1;
}

// CreateDeposit

message CreateDepositRequest {
  string address = 1;
  int64 value_sats = 2;
  int64 fee_sats = 3;
}

message CreateDepositResponse {
  string txid = 1;
}

// GetPendingWithdrawalBundle

message GetPendingWithdrawalBundleRequest {}

message GetPendingWithdrawalBundleResponse {
  // JSON string of the bundle, empty if none.
  string bundle_json = 1;
}

// ConnectPeer

message ConnectPeerRequest {
  string address = 1;
}

message ConnectPeerResponse {}

// ForgetPeer

message ForgetPeerRequest {
  string address = 1;
}

message ForgetPeerResponse {}

// ListPeers

message ListPeersRequest {}

message ListPeersResponse {
  string peers_json = 1;
}

// Mine

message MineRequest {
  int64 fee_sats = 1;
}

message MineResponse {
  string bmm_result_json = 1;
}

// GetBlock

message GetBlockRequest {
  string hash = 1;
}

message GetBlockResponse {
  string block_json = 1;
}

// GetBestMainchainBlockHash

message GetBestMainchainBlockHashRequest {}

message GetBestMainchainBlockHashResponse {
  string hash = 1;
}

// GetBestSidechainBlockHash

message GetBestSidechainBlockHashRequest {}

message GetBestSidechainBlockHashResponse {
  string hash = 1;
}

// GetBmmInclusions

message GetBmmInclusionsRequest {
  string block_hash = 1;
}

message GetBmmInclusionsResponse {
  string inclusions = 1;
}

// GetWalletUtxos

message GetWalletUtxosRequest {}

message GetWalletUtxosResponse {
  string utxos_json = 1;
}

// ListUtxos

message ListUtxosRequest {}

message ListUtxosResponse {
  string utxos_json = 1;
}

// RemoveFromMempool

message RemoveFromMempoolRequest {
  string txid = 1;
}

message RemoveFromMempoolResponse {}

// GetLatestFailedWithdrawalBundleHeight

message GetLatestFailedWithdrawalBundleHeightRequest {}

message GetLatestFailedWithdrawalBundleHeightResponse {
  // 0 means no failed bundle.
  int64 height = 1;
}

// GenerateMnemonic

message GenerateMnemonicRequest {}

message GenerateMnemonicResponse {
  string mnemonic = 1;
}

// SetSeedFromMnemonic

message SetSeedFromMnemonicRequest {
  string mnemonic = 1;
}

message SetSeedFromMnemonicResponse {}

// CallRaw

message CallRawRequest {
  string method = 1;
  string params_json = 2;
}

message CallRawResponse {
  string result_json = 1;
}

// --- CoinShift-specific messages ---

// GetWalletAddresses

message GetWalletAddressesRequest {}

message GetWalletAddressesResponse {
  repeated string addresses = 1;
}

// OpenapiSchema

message OpenapiSchemaRequest {}

message OpenapiSchemaResponse {
  string schema_json = 1;
}

// CreateSwap

message CreateSwapRequest {
  int64 l2_amount_sats = 1;
  int64 l1_amount_sats = 2;
  string l1_recipient_address = 3;
  string parent_chain = 4;
  optional string l2_recipient = 5;
  optional int32 required_confirmations = 6;
  int64 fee_sats = 7;
}

message CreateSwapResponse {
  string swap_id = 1;
  string txid = 2;
}

// ClaimSwap

message ClaimSwapRequest {
  string swap_id = 1;
  optional string l2_claimer_address = 2;
}

message ClaimSwapResponse {
  string txid = 1;
}

// GetSwapStatus

message GetSwapStatusRequest {
  string swap_id = 1;
}

message GetSwapStatusResponse {
  string swap_json = 1;
}

// ListSwaps

message ListSwapsRequest {}

message ListSwapsResponse {
  string swaps_json = 1;
}

// ListSwapsByRecipient

message ListSwapsByRecipientRequest {
  string recipient = 1;
}

message ListSwapsByRecipientResponse {
  string swaps_json = 1;
}

// UpdateSwapL1Txid

message UpdateSwapL1TxidRequest {
  string swap_id = 1;
  string l1_txid_hex = 2;
  int32 confirmations = 3;
}

message UpdateSwapL1TxidResponse {}

// ReconstructSwaps

message ReconstructSwapsRequest {}

message ReconstructSwapsResponse {
  int64 count = 1;
}
