syntax = "proto3";

package orchestrator.v1;

service OrchestratorService {
  // List all configured binaries and their status.
  rpc ListBinaries(ListBinariesRequest) returns (ListBinariesResponse);

  // Get the status of a single binary.
  rpc GetBinaryStatus(GetBinaryStatusRequest) returns (GetBinaryStatusResponse);

  // Download a binary with streaming progress.
  // Kicks off a download in a background goroutine and returns
  // immediately. Progress (MB downloaded / total, is_downloading) is
  // polled out of GetSyncStatus, never tied to this RPC's lifetime — so
  // a transport blip can't cancel an in-flight download.
  rpc DownloadBinary(DownloadBinaryRequest) returns (DownloadBinaryResponse);

  // Start a binary.
  rpc StartBinary(StartBinaryRequest) returns (StartBinaryResponse);

  // Stop a binary.
  rpc StopBinary(StopBinaryRequest) returns (StopBinaryResponse);

  // Stream stdout/stderr from a binary.
  rpc StreamLogs(StreamLogsRequest) returns (stream StreamLogsResponse);

  // Kick off a binary and its full L1 dependency chain (Core -> Enforcer ->
  // target). Fire-and-forget on the server: returns as soon as the boot
  // goroutine is dispatched. Callers poll GetSyncStatus / ListBinaries for
  // download progress and connection state — never tied to this RPC's
  // lifetime, so a transport blip can't kill an in-flight download.
  rpc StartWithL1(StartWithL1Request) returns (StartWithL1Response);

  // Shutdown all running binaries.
  rpc ShutdownAll(ShutdownAllRequest) returns (stream ShutdownAllResponse);

  // Get the current BTC/USD exchange rate.
  rpc GetBTCPrice(GetBTCPriceRequest) returns (GetBTCPriceResponse);

  // Get blockchain info from Bitcoin Core (proxied via orchestrator).
  rpc GetMainchainBlockchainInfo(GetMainchainBlockchainInfoRequest) returns (GetMainchainBlockchainInfoResponse);

  // Get blockchain info from the enforcer (proxied via orchestrator).
  rpc GetEnforcerBlockchainInfo(GetEnforcerBlockchainInfoRequest) returns (GetEnforcerBlockchainInfoResponse);

  // One-shot snapshot of mainchain + enforcer + bitwindow daemon sync state.
  // Backend fans out to all three in parallel so the three numbers are taken
  // at the same wall-clock instant — no two cards in the UI can ever disagree.
  rpc GetSyncStatus(GetSyncStatusRequest) returns (GetSyncStatusResponse);

  // Get wallet balance from Bitcoin Core (proxied via orchestrator).
  rpc GetMainchainBalance(GetMainchainBalanceRequest) returns (GetMainchainBalanceResponse);

  // Preview what would be deleted for the given reset categories (no side effects).
  rpc PreviewResetData(PreviewResetDataRequest) returns (PreviewResetDataResponse);

  // Reset/delete data categories. Stops affected binaries, streams each deletion event.
  rpc StreamResetData(StreamResetDataRequest) returns (stream StreamResetDataResponse);

  // ─── Bitcoin Core typed extensions ────────────────────────────────────────
  // Sit alongside the btc-buf BitcoinService for methods btc-buf doesn't type
  // (getmempoolinfo) plus a generic raw-call escape hatch (finalizepsbt,
  // descriptorprocesspsbt, …). Frontends prefer the typed btc-buf methods
  // when available.

  // Full bitcoind getmempoolinfo response. Distinct from getrawmempool.
  rpc GetCoreMempoolInfo(GetCoreMempoolInfoRequest) returns (GetCoreMempoolInfoResponse);

  // Generic raw bitcoind RPC. Optional `wallet` field routes the call to
  // /wallet/{name} on bitcoind for wallet-scoped RPCs.
  rpc CoreRawCall(CoreRawCallRequest) returns (CoreRawCallResponse);
}

message BinaryStatusMsg {
  string name = 1;
  string display_name = 2;
  bool running = 3;
  bool healthy = 4;
  int32 pid = 5;
  int64 uptime_seconds = 6;
  int32 chain_layer = 7;
  int32 port = 8;
  string error = 9;
  bool connected = 10;
  string startup_error = 11;    // warmup message (e.g. "Loading block index...")
  string connection_error = 12; // real connection error
  bool stopping = 13;           // binary is being stopped
  bool initializing = 14;       // binary is starting up / restarting
  bool connect_mode_only = 15;  // willfully stopped, only watching for external restart
  bool downloadable = 16;       // binary has download URLs configured
  string description = 17;      // short description of the binary
  bool downloaded = 18;         // binary file exists on disk
  bool port_in_use = 19;       // port is reachable but not managed by orchestrator
  string version = 20;         // configured version string
  string repo_url = 21;        // source code repository URL
  repeated StartupLogEntryMsg startup_logs = 22; // recent startup progress messages
  // Absolute path to the launchable binary on disk (variant-aware: returns
  // bin/test/<binary>/... for active sidechain alt-builds, the resolved
  // .app/Contents/MacOS path on macOS, etc.). Empty when not downloaded.
  string binary_path = 23;
}

message StartupLogEntryMsg {
  int64 timestamp_unix = 1;
  string message = 2;
}

// ListBinaries

message ListBinariesRequest {}

message ListBinariesResponse {
  repeated BinaryStatusMsg binaries = 1;
}

// GetBinaryStatus

message GetBinaryStatusRequest {
  string name = 1;
}

message GetBinaryStatusResponse {
  BinaryStatusMsg status = 1;
}

// DownloadBinary

message DownloadBinaryRequest {
  string name = 1;
  bool force = 2;
}

message DownloadBinaryResponse {}

// StartBinary

message StartBinaryRequest {
  string name = 1;
  repeated string extra_args = 2;
  map<string, string> env = 3;
}

message StartBinaryResponse {
  int32 pid = 1;
}

// StopBinary

message StopBinaryRequest {
  string name = 1;
  bool force = 2;
}

message StopBinaryResponse {}

// StreamLogs

message StreamLogsRequest {
  string name = 1;
  int32 tail = 2; // number of recent lines to include
}

message StreamLogsResponse {
  string stream = 1; // "stdout" or "stderr"
  string line = 2;
  int64 timestamp_unix = 3;
}

// StartWithL1

message StartWithL1Request {
  string target = 1;
  repeated string target_args = 2;
  map<string, string> target_env = 3;
  repeated string core_args = 4;
  repeated string enforcer_args = 5;
  bool immediate = 6;
}

message StartWithL1Response {}

// ShutdownAll

message ShutdownAllRequest {
  bool force = 1;
}

message ShutdownAllResponse {
  int32 total_count = 1;
  int32 completed_count = 2;
  string current_binary = 3;
  bool done = 4;
  string error = 5;
}

// GetBTCPrice

message GetBTCPriceRequest {}

message GetBTCPriceResponse {
  double btcusd = 1;
  int64 last_updated_unix = 2;
}

// GetMainchainBlockchainInfo

message GetMainchainBlockchainInfoRequest {}

message GetMainchainBlockchainInfoResponse {
  string chain = 1;
  int32 blocks = 2;
  int32 headers = 3;
  string best_block_hash = 4;
  double difficulty = 5;
  int64 time = 6;
  int64 median_time = 7;
  double verification_progress = 8;
  bool initial_block_download = 9;
  string chain_work = 10;
  int64 size_on_disk = 11;
  bool pruned = 12;
}

// GetEnforcerBlockchainInfo

message GetEnforcerBlockchainInfoRequest {}

message GetEnforcerBlockchainInfoResponse {
  int32 blocks = 1;
  int32 headers = 2;
  int64 time = 3;
}

// GetSyncStatus
//
// Atomic snapshot of mainchain + enforcer sync state, plus optionally a
// caller-specified sidechain (bitwindow, thunder, zside, bitnames,
// bitassets, photon, truthcoin, coinshift). The orchestrator fans out
// concurrently and returns a combined result. A daemon that isn't
// reachable returns its `ChainSync` zero-valued with an `error` string.

message GetSyncStatusRequest {}

message GetSyncStatusResponse {
  ChainSync mainchain = 1;                   // bitcoind
  ChainSync enforcer = 2;                    // BIP300/301 enforcer
  // All sidechains the orchestrator knows about. Always includes every
  // configured sidechain — daemons that aren't running yet appear with
  // their `sync.error` set so the UI can render a placeholder. While a
  // sidechain is downloading, its sync.is_downloading is true and
  // blocks/headers are MB downloaded / MB total.
  repeated SidechainStatus sidechains = 3;
}

// SidechainType keeps the response strongly-typed so callers don't have to
// match magic strings. UNSPECIFIED is reserved for forwards-compat — when
// a frontend sees it, the binary is known to the orchestrator but doesn't
// have a typed enum value yet.
enum SidechainType {
  SIDECHAIN_TYPE_UNSPECIFIED = 0;
  SIDECHAIN_TYPE_THUNDER = 1;
  SIDECHAIN_TYPE_ZSIDE = 2;
  SIDECHAIN_TYPE_BITNAMES = 3;
  SIDECHAIN_TYPE_BITASSETS = 4;
  SIDECHAIN_TYPE_TRUTHCOIN = 5;
  SIDECHAIN_TYPE_PHOTON = 6;
  SIDECHAIN_TYPE_COINSHIFT = 7;
}

message SidechainStatus {
  SidechainType type = 1;
  ChainSync sync = 2;
}

message ChainSync {
  // While is_downloading=true: blocks = MB downloaded, headers = MB total.
  // Otherwise: blocks = current tip height, headers = bitcoind's header
  // count (or this daemon's own headers if mainchain is unavailable).
  int32 blocks = 1;
  int32 headers = 2;
  // Block tip timestamp (unix seconds), 0 if no tip yet.
  int64 time = 3;
  // Empty on success; otherwise a short description of why this daemon's
  // sync info isn't available (not running, RPC error, etc.).
  string error = 4;
  // When true, the orchestrator is currently downloading the binary for
  // this slot — blocks/headers carry MB downloaded / MB total instead of
  // chain heights. The UI uses this to format "X MB" vs "N blocks".
  bool is_downloading = 5;
}

// GetMainchainBalance

message GetMainchainBalanceRequest {}

message GetMainchainBalanceResponse {
  double confirmed = 1;
  double unconfirmed = 2;
}

// PreviewResetData

message PreviewResetDataRequest {
  bool delete_blockchain_data = 1;
  bool delete_node_software = 2;
  bool delete_logs = 3;
  bool delete_settings = 4;
  bool delete_wallet_files = 5;
  bool also_reset_sidechains = 6;
}

message PreviewResetDataResponse {
  repeated ResetFileInfo files = 1;
}

message ResetFileInfo {
  string path = 1;
  string category = 2; // e.g. "blockchain_data", "node_software", "logs", "settings", "wallet"
  int64 size_bytes = 3;
  bool is_directory = 4;
}

// StreamResetData

message StreamResetDataRequest {
  bool delete_blockchain_data = 1;
  bool delete_node_software = 2;
  bool delete_logs = 3;
  bool delete_settings = 4;
  bool delete_wallet_files = 5;
  bool also_reset_sidechains = 6;
}

message StreamResetDataResponse {
  string path = 1;
  string category = 2;
  bool success = 3;
  string error = 4;
  bool done = 5; // true on final message
  int32 deleted_count = 6;
  int32 failed_count = 7;
}

// ─── Bitcoin Core typed extensions ────────────────────────────────────────

message GetCoreMempoolInfoRequest {}

// Mirrors bitcoind's getmempoolinfo. Aggregate stats — distinct from
// getrawmempool which lists individual mempool txids.
message GetCoreMempoolInfoResponse {
  bool loaded = 1;
  // Number of transactions in the mempool.
  int64 size = 2;
  // Sum of serialized sizes (bytes).
  int64 bytes = 3;
  // Total memory usage (bytes).
  int64 usage = 4;
  // Sum of all tx fees (BTC).
  double total_fee = 5;
  // Mempool size cap (bytes).
  int64 max_mempool = 6;
  // Lowest fee rate accepted into mempool (BTC/kvB).
  double mempool_min_fee = 7;
  // Lowest fee rate eligible for relay (BTC/kvB).
  double min_relay_tx_fee = 8;
  // Minimum bump-fee increment (BTC/kvB).
  double incremental_relay_fee = 9;
  // Transactions in mempool not yet broadcast.
  int64 unbroadcast_count = 10;
  bool full_rbf = 11;
}

message CoreRawCallRequest {
  // bitcoind RPC method name (e.g. "finalizepsbt").
  string method = 1;
  // JSON-encoded positional params array (e.g. '["psbtBase64", false]').
  // Empty string means no params.
  string params_json = 2;
  // Optional bitcoind wallet name to scope the call to. When set, the request
  // is routed to /wallet/{wallet} on bitcoind so wallet-scoped RPCs like
  // listtransactions / getbalance / getwalletinfo dispatch to the right
  // wallet. Empty = node-level call.
  string wallet = 3;
}

message CoreRawCallResponse {
  // JSON-encoded result. Caller decodes to its expected shape.
  string result_json = 1;
}
