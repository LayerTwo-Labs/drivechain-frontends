syntax = "proto3";

package orchestrator.v1;

service SidechainConfService {
  // Get current sidechain configuration state.
  rpc GetSidechainConfig(GetSidechainConfigRequest) returns (GetSidechainConfigResponse);

  // Write sidechain configuration content.
  rpc WriteSidechainConfig(WriteSidechainConfigRequest) returns (WriteSidechainConfigResponse);

  // Sync network from Bitcoin Core config.
  rpc SyncSidechainNetworkFromBitcoinConf(SyncSidechainNetworkFromBitcoinConfRequest) returns (SyncSidechainNetworkFromBitcoinConfResponse);
}

// GetSidechainConfig

message GetSidechainConfigRequest {
  string sidechain_name = 1;
}

message GetSidechainConfigResponse {
  string config_content = 1;
  string config_path = 2;
  string default_config = 3;
  repeated string cli_args = 4;
  string network = 5;
}

// WriteSidechainConfig

message WriteSidechainConfigRequest {
  string sidechain_name = 1;
  string config_content = 2;
}

message WriteSidechainConfigResponse {}

// SyncSidechainNetworkFromBitcoinConf

message SyncSidechainNetworkFromBitcoinConfRequest {
  string sidechain_name = 1;
}

message SyncSidechainNetworkFromBitcoinConfResponse {}
