name: Thunder schema snapshot

on:
  pull_request:
    paths:
      - "sidechain-orchestrator/sidechain/thunder/**"
      - ".github/workflows/thunder-schema.yml"

env:
  GO_VERSION: "1.25"

jobs:
  schema-validate:
    name: validate openapi_schema snapshot
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: thunder-schema-${{ env.GO_VERSION }}-${{ hashFiles('sidechain-orchestrator/go.sum') }}
          restore-keys: |
            thunder-schema-${{ env.GO_VERSION }}-
      
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # ---------------------------------------------------------------
      # Build orchestratorctl and use it to generate the schema
      # ---------------------------------------------------------------
      - name: Build orchestratorctl
        working-directory: sidechain-orchestrator
        run: |
          go build -o orchestratorctl ./cmd/orchestratorctl/

      - name: Generate schema using orchestrator proxy
        working-directory: sidechain-orchestrator
        env:
          ORCHESTRATOR_AUTO_DOWNLOAD: "1"
        run: |
          set -euo pipefail
          ./orchestratorctl thunder generate-schema > /tmp/live_schema.json
          # Validate it's real JSON
          python3 -m json.tool /tmp/live_schema.json > /dev/null
          echo "THUNDER_CLI_SCHEMA=/tmp/live_schema.json" >> "$GITHUB_ENV"

      - name: Validate schema snapshot
        working-directory: sidechain-orchestrator
        env:
          THUNDER_SCHEMA_VALIDATE_CLI: "1"
          THUNDER_CLI_SCHEMA: /tmp/live_schema.json
        run: go test -v -run TestSchemaSnapshot ./sidechain/thunder/