name: Go

on:
  pull_request:
    paths:
      - "bitwindow/server/**"
      - "sidechain-orchestrator/**"
      - "faucet/server/**"
      - "sail_ui/assets/chains_config.json"
      - ".github/workflows/go.yml"

env:
  GO_VERSION: "1.25"

jobs:
  config-sync:
    name: chains_config.json sync
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Validate chains_config.json copies are identical
        run: |
          diff sidechain-orchestrator/chains_config.json sail_ui/assets/chains_config.json
          diff sidechain-orchestrator/chains_config.json sidechain-orchestrator/config/chains_config.json

  go-ci:
    name: ${{ matrix.module }}
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        module:
          - bitwindow/server
          - sidechain-orchestrator
          - faucet/server
        include:
          - module: bitwindow/server
            install-sqlite: true

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install SQLite
        if: matrix.install-sqlite
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-ci-${{ env.GO_VERSION }}-${{ matrix.module }}-${{ hashFiles(format('{0}/go.sum', matrix.module)) }}
          restore-keys: |
            go-ci-${{ env.GO_VERSION }}-${{ matrix.module }}-

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: ${{ matrix.module }}
          version: latest
          args: --verbose

      - name: Test
        run: go test -timeout=5m ./...

      - name: Build
        run: go build ./...