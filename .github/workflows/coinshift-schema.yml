name: Coinshift schema snapshot

on:
  pull_request:
    paths:
      - "sidechain-orchestrator/sidechain/coinshift/**"
      - ".github/workflows/coinshift-schema.yml"

env:
  GO_VERSION: "1.25"

jobs:
  schema-validate:
    name: validate openapi_schema snapshot
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: coinshift-schema-${{ env.GO_VERSION }}-${{ hashFiles('sidechain-orchestrator/go.sum') }}
          restore-keys: |
            coinshift-schema-${{ env.GO_VERSION }}-
      
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # ---------------------------------------------------------------
      # Download the Coinshift release archive. It contains both the
      # server binary and the CLI binary. We use the CLI to generate
      # the OpenAPI schema locally (no mainchain node required).
      # ---------------------------------------------------------------
      - name: Cache Coinshift binary
        id: cache-coinshift
        uses: actions/cache@v4
        with:
          path: coinshift-cli
          key: coinshift-cli-latest
          
      - name: Download Coinshift binary
        if: steps.cache-coinshift.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          url="https://releases.drivechain.info/L2-S${SIDECHAIN_ID}-Coinshift-latest-x86_64-unknown-linux-gnu.zip"
          echo "Downloading $url"
          curl -fSL --retry 3 "$url" -o coinshift.zip
          unzip -o coinshift.zip
          # The CLI binary is named coinshift-cli-* after extraction
          CLI_BIN=$(ls coinshift-cli-* 2>/dev/null | head -1)
          if [ -z "$CLI_BIN" ]; then
            echo "::error::coinshift-cli binary not found in archive"
            ls -la
            exit 1
          fi
          chmod +x "$CLI_BIN"
          mv "$CLI_BIN" coinshift-cli
        env:
          SIDECHAIN_ID: "0"  # This would need to be set properly for each sidechain
          
      - name: Set CLI path
        run: |
          chmod +x coinshift-cli
          echo "COINSHIFT_CLI=$PWD/coinshift-cli" >> "$GITHUB_ENV"

      - name: Generate schema from CLI and validate snapshot
        working-directory: sidechain-orchestrator
        run: |
          set -euo pipefail
          "$COINSHIFT_CLI" openapi-schema > /tmp/live_schema.json
          # Validate it's real JSON
          python3 -m json.tool /tmp/live_schema.json > /dev/null
          echo "COINSHIFT_CLI_SCHEMA=/tmp/live_schema.json" >> "$GITHUB_ENV"

      - name: Validate schema snapshot
        working-directory: sidechain-orchestrator
        env:
          COINSHIFT_SCHEMA_VALIDATE_CLI: "1"
          COINSHIFT_CLI_SCHEMA: /tmp/live_schema.json
        run: go test -v -run TestSchemaSnapshot ./sidechain/coinshift/
