name: BitNames schema snapshot

on:
  pull_request:
    paths:
      - "sidechain-orchestrator/sidechain/bitnames/**"
      - ".github/workflows/bitnames-schema.yml"

env:
  GO_VERSION: "1.25"

jobs:
  schema-validate:
    name: validate openapi_schema snapshot
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # ---------------------------------------------------------------
      # Download the BitNames release archive. It contains both the
      # server binary and the CLI binary. We use the CLI to generate
      # the OpenAPI schema locally (no mainchain node required).
      # ---------------------------------------------------------------
      - name: Download BitNames binary
        run: |
          set -euo pipefail
          url="https://releases.drivechain.info/L2-S2-BitNames-latest-x86_64-unknown-linux-gnu.zip"
          echo "Downloading $url"
          curl -fSL --retry 3 "$url" -o bitnames.zip
          unzip -o bitnames.zip
          # The CLI binary is named bitnames-cli-* after extraction
          CLI_BIN=$(ls bitnames-cli-* 2>/dev/null | head -1)
          if [ -z "$CLI_BIN" ]; then
            echo "::error::bitnames-cli binary not found in archive"
            ls -la
            exit 1
          fi
          chmod +x "$CLI_BIN"
          echo "BITNAMES_CLI=$PWD/$CLI_BIN" >> "$GITHUB_ENV"

      - name: Generate schema from CLI and validate snapshot
        working-directory: sidechain-orchestrator
        run: |
          set -euo pipefail
          "$BITNAMES_CLI" openapi-schema > /tmp/live_schema.json
          # Validate it's real JSON
          python3 -m json.tool /tmp/live_schema.json > /dev/null
          echo "BITNAMES_CLI_SCHEMA=/tmp/live_schema.json" >> "$GITHUB_ENV"

      - name: Validate schema snapshot
        working-directory: sidechain-orchestrator
        env:
          BITNAMES_SCHEMA_VALIDATE_CLI: "1"
          BITNAMES_CLI_SCHEMA: /tmp/live_schema.json
        run: go test -v -run TestSchemaSnapshot ./sidechain/bitnames/
