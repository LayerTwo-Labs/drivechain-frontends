name: Integration Tests

on:
  pull_request:
    paths:
      - "sidechain-orchestrator/**"
      - "bitwindow/server/**"
      - ".github/workflows/integration.yml"

env:
  GO_VERSION: "1.25"

jobs:
  integration:
    name: integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event.pull_request.draft == false
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]  # Removed macos/windows to save minutes
        include:
          - os: ubuntu-latest
            cache-path: ~/.local/share/bitwindow/assets/bin

    steps:
      - uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ env.GO_VERSION }}-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ env.GO_VERSION }}-${{ runner.os }}-

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Rosetta (macOS ARM)
        if: runner.os == 'macOS'
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Install SQLite (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Cache bitcoind binary
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cache-path }}
          key: bitcoind-${{ runner.os }}-v30.2

      - name: Run orchestrator wallet integration tests
        working-directory: sidechain-orchestrator
        run: go test -v -tags integration -timeout 10m ./wallet/

      - name: Run bitwindow wallet integration tests
        working-directory: bitwindow/server
        run: go test -v -tags integration -timeout 10m ./integrationtest/
