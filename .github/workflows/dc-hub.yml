name: DC Hub

on:
  push:
    branches: [master]
    paths:
      - "dc-hub/**"
      - ".github/workflows/dc-hub.yml"
  pull_request:
    branches: [master]
    paths:
      - "dc-hub/**"
      - ".github/workflows/dc-hub.yml"

jobs:
  web-format:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('dc-hub/bun.lock') }}
          restore-keys: |
            bun-

      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: dc-hub
      - run: bun run format:check
        working-directory: dc-hub

  web-lint:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: biomejs/setup-biome@v2
        with:
          working-directory: dc-hub
      - name: Run Biome
        run: biome ci
        working-directory: dc-hub

  web-build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('dc-hub/bun.lock') }}
          restore-keys: |
            bun-

      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: dc-hub
      - run: bun run build
        working-directory: dc-hub

  # Build and push ALL events. We'll make sure to give the images
  # sensible tags, so there's no confusion around what's 'dev' builds
  # through PRs, and what's proper 'master' builds.
  #
  # Official GitHub docs on this: https://docs.github.com/en/actions/use-cases-and-examples/publishing-packages/publishing-docker-images
  build-push-docker:
    runs-on: ubuntu-latest-large
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        service: [frontend-server, backend]
        include:
          - service: frontend-server
            dockerfile: Dockerfile
            context: .
          - service: backend
            dockerfile: ./server/Dockerfile
            context: ./server

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/dc-hub-${{ matrix.service }}
          tags: |
            type=sha,event=push
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and maybe push) Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./dc-hub/${{ matrix.context }}
          file: ./dc-hub/${{ matrix.dockerfile }}
          #prettier-ignore
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          #prettier-ignore
          tags: ${{ steps.meta.outputs.tags }}
          build-args: ${{ matrix.build-args }}
          #prettier-ignore
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/dc-hub-${{ matrix.service }}:latest
          cache-to: type=inline
