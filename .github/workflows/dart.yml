name: Dart

on:
  pull_request:
    paths:
      - "sail_ui/**"
      - "drivechain_lints/**"
      - "thunder/**"
      - "truthcoin/**"
      - "photon/**"
      - "bitnames/**"
      - "bitassets/**"
      - "zside/**"
      - "bitwindow/**"
      - "coinshift/**"
      - ".github/workflows/dart.yml"

env:
  FLUTTER_VERSION: "3.41.6"
  DART_VERSION: "3.11.4"

jobs:
  format-lint-test:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        package:
          - sail_ui
          - thunder
          - truthcoin
          - photon
          - bitnames
          - bitassets
          - zside
          - bitwindow
          - coinshift

    defaults:
      run:
        working-directory: ${{ matrix.package }}

    steps:
      - uses: actions/checkout@v5

      - name: Check migration registrations
        if: matrix.package == 'sail_ui'
        run: ../scripts/check-migrations.sh

      - name: Cache Flutter SDK
        uses: actions/cache@v5
        with:
          path: |
            ~/.flutter
            ~/.pub-cache
          key: flutter-${{ env.FLUTTER_VERSION }}-${{ env.DART_VERSION }}-${{ runner.os }}
          restore-keys: |
            flutter-${{ env.FLUTTER_VERSION }}-${{ env.DART_VERSION }}-
            flutter-${{ env.FLUTTER_VERSION }}-

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ matrix.package }}/.dart_tool
            ${{ matrix.package }}/build
          key: dart-deps-${{ matrix.package }}-${{ hashFiles(format('{0}/pubspec.lock', matrix.package)) }}
          restore-keys: |
            dart-deps-${{ matrix.package }}-

        # https://docs.flutter.dev/platform-integration/linux/building
      - name: Install Linux build dependencies
        run: sudo apt-get update -y && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Create necessary directories
        run: |
          rm -rf assets/bin
          mkdir -p assets/bin

      - name: Verify formatting
        # prettier-ignore
        run: find . -name "*.dart" -not -path "./lib/gen/*" -not -path "./.dart_tool/*" | xargs dart format --set-exit-if-changed

      - name: Analyze
        run: dart analyze

      - name: Check for fixable issues
        run: |
          FIXES=$(dart fix --dry-run)
          if [[ "$FIXES" != *"Nothing to fix!"* ]]; then
            echo "Fixable issues found. Run 'dart fix --apply' locally and commit changes."
            echo "$FIXES"
            exit 1
          fi

      - name: Test
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "No test directory, skipping."
          fi

      - name: Build
        run: flutter build linux
        if: matrix.package != 'sail_ui'
