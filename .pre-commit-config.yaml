repos:
  - repo: https://github.com/dluksza/flutter-analyze-pre-commit
    rev: 4afcaa82fc368d40d486256bf4edba329bf667bb
    hooks:
      # Run format first, quickest operation
      - id: dart-format
        exclude: "lib/gen/.*"

      - id: flutter-analyze
        # exclude: "lib/gen/.*"
        args:
          - bitwindow/lib/*

  - repo: local
    hooks:
      - id: prettier-faucet
        name: prettier (faucet)
        entry: faucet/node_modules/.bin/prettier --write --ignore-unknown
        language: system
        files: ^faucet/
        exclude: ^faucet/(gen/|node_modules/|\.next/|bun\.lock)

      - id: gofmt-faucet-server
        name: gofmt (faucet server)
        entry: gofmt -l -w
        language: system
        files: ^faucet/server/.*\.go$
        exclude: ^faucet/server/gen/
