repos:
  - repo: https://github.com/dluksza/flutter-analyze-pre-commit
    rev: 4afcaa82fc368d40d486256bf4edba329bf667bb
    hooks:
      # Run format first, quickest operation
      - id: dart-format
        exclude: "lib/gen/.*"

      - id: flutter-analyze
        # exclude: "lib/gen/.*"
        args:
          - bitwindow/lib/*

  - repo: local
    hooks:
      - id: prettier-dc-hub
        name: prettier (dc-hub)
        entry: dc-hub/node_modules/.bin/prettier --write --ignore-unknown
        language: system
        files: ^dc-hub/
        exclude: ^dc-hub/(gen/|node_modules/|\.next/|bun\.lock)

      - id: gofmt-dc-hub-server
        name: gofmt (dc-hub server)
        entry: gofmt -l -w
        language: system
        files: ^dc-hub/server/.*\.go$
        exclude: ^dc-hub/server/gen/
